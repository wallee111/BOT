<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Capture - BOT</title>
    <meta name="theme-color" content="#ffca28">
    <link rel="manifest" href="/manifest.json">
    <script src="/sw-register.js" defer></script>
</head>

<body>
    <a href="#dashboard" class="skip-link">Skip to main content</a>
    <main class="app-container">
        <!-- Desktop Sidebar -->
        <aside class="desktop-sidebar" aria-label="Main Navigation">
            <div class="sidebar-header">
                <h2>BOT</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="is-active">Capture</a>
                <a href="review.html">Review</a>
                <a href="categories.html">Categories</a>
                <a href="canvas.html">Canvas</a>
                <a href="account.html">Account</a>
            </nav>
            <div class="sidebar-footer">
                <div id="sidebarSync" class="sync-indicator"></div>
            </div>
        </aside>

        <div class="main-content-wrap">
            <header class="top-bar flex items-center justify-between gap-4">
                <div class="top-bar__title flex-1">
                    <h1 class="sm:tracking-tight">Bucket of thoughts</h1>
                </div>
                <div class="top-bar__controls flex items-center gap-3 flex-wrap justify-end">
                    <a class="icon-link" href="account.html" aria-label="Account">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2" />
                            <path d="M4 20c0-4 3.5-7 8-7s8 3 8 7" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" />
                        </svg>
                    </a>
                </div>
            </header>
            <!-- Dashboard -->
            <section class="dashboard" id="dashboard">
                <!-- Pinned Ideas Section -->
                <section class="dash-section" id="pinnedSection">
                    <div class="dash-section__header">
                        <h2 class="dash-section__title">Pinned</h2>
                        <span class="dash-section__count" id="pinnedCount"></span>
                    </div>
                    <div class="dash-section__body" id="pinnedFeed" aria-live="polite">
                        <!-- Pinned ideas rendered here -->
                    </div>
                </section>

                <!-- Resurface Section -->
                <section class="dash-section" id="resurfaceSection" hidden>
                    <div class="dash-section__header">
                        <h2 class="dash-section__title">Resurface</h2>
                        <button type="button" class="dash-section__action" id="resurfaceRefresh" aria-label="Show another">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="dash-section__body" id="resurfaceFeed" aria-live="polite">
                        <!-- Resurfaced idea rendered here -->
                    </div>
                </section>

                <!-- Hidden Ideas Section (collapsible) -->
                <section class="dash-section dash-section--collapsible" id="hiddenSection" hidden>
                    <button type="button" class="dash-section__header dash-section__toggle" id="hiddenToggle" aria-expanded="false" aria-label="Toggle hidden ideas section">
                        <h2 class="dash-section__title">Hidden</h2>
                        <span class="dash-section__count" id="hiddenCount"></span>
                        <svg class="dash-section__chevron" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    <div class="dash-section__body dash-section__collapsible" id="hiddenFeed" aria-live="polite" hidden>
                        <!-- Hidden ideas rendered here -->
                    </div>
                </section>
            </section>
        </div>

        <!-- Desktop Detail Pane -->
        <aside class="detail-pane" id="detailPane">
            <button type="button" class="detail-pane__close" aria-label="Close detail pane">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <line x1="6" y1="6" x2="18" y2="18" stroke-width="2" stroke-linecap="round" />
                    <line x1="18" y1="6" x2="6" y2="18" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
            <div class="detail-pane-empty">
                <p>Select an idea to view details and comments.</p>
            </div>
            <div id="detailContent" class="detail-content" hidden>
                <!-- Dynamically populated when an idea is selected -->
            </div>
        </aside>

        <!-- Anchored Category Edit Dropdown (shared style with review) -->
        <div id="categoryEditDropdown" class="md3-menu" hidden>
            <div id="categoryEditDropdownContent" class="md3-menu__scroll"></div>
        </div>
    </main>

    <!-- Capture FAB + Overlay (fixed position, outside main) -->
    <button type="button" class="capture-fab" id="captureFab" aria-label="New idea">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 5v14M5 12h14" />
        </svg>
    </button>

    <div class="capture-overlay" id="captureOverlay" hidden>
        <div class="capture-overlay__backdrop" id="captureBackdrop"></div>
        <div class="capture-overlay__sheet">
            <form id="ideaForm" class="capture-form">
                <label for="text" class="visually-hidden">What's on your mind?</label>
                <textarea id="text" class="capture-form__input" placeholder="What's on your mind?..." maxlength="500" required rows="3"></textarea>
                <div class="capture-form__tools">
                    <button type="button" id="categorySelectBtn" class="capture-form__category-btn" aria-label="Choose category">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 8v8M8 12h8" stroke-linecap="round" />
                        </svg>
                        <span class="capture-form__category-label" id="categoryLabel">Category</span>
                    </button>
                    <label for="categoryNew" class="visually-hidden">New category</label>
                    <input id="categoryNew" type="text" class="capture-form__category-input" placeholder="New category..." autocomplete="off" />
                    <select id="categorySelect" hidden aria-label="Choose category">
                        <option value="">Choose category...</option>
                    </select>
                    <label for="prioritySelect" class="visually-hidden">Priority level</label>
                    <select id="prioritySelect" hidden aria-label="Priority level">
                        <option value="">No priority</option>
                        <option value="urgent">Urgent</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                    <button type="submit" class="capture-form__send" aria-label="Save idea">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 19V5M5 12l7-7 7 7" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Input Category Menu (outside overlay to avoid transform stacking context breaking position:fixed) -->
    <div id="inputCategoryMenu" class="md3-menu md3-menu--up" role="menu"></div>

    <nav class="bottom-nav" aria-label="App navigation">
        <a class="bottom-nav__item is-active" href="index.html" aria-current="page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <span class="bottom-nav__label">Capture</span>
        </a>
        <a class="bottom-nav__item" href="review.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 7h12M6 12h12M6 17h8" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="4" cy="7" r="1" fill="currentColor" />
                <circle cx="4" cy="12" r="1" fill="currentColor" />
                <circle cx="4" cy="17" r="1" fill="currentColor" />
            </svg>
            <span class="bottom-nav__label">Review</span>
        </a>
        <a class="bottom-nav__item" href="categories.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4a8 8 0 1 0 0 16h1a1.5 1.5 0 0 0 0-3h-.75a2.75 2.75 0 0 1 0-5.5h.25a2.5 2.5 0 0 0 0-5H12z"
                    fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round" />
                <circle cx="15.5" cy="9" r="1.1" fill="currentColor" />
                <circle cx="9" cy="9" r="1.1" fill="currentColor" />
                <circle cx="10.5" cy="14" r="1.1" fill="currentColor" />
            </svg>
            <span class="bottom-nav__label">Categories</span>
        </a>
        <a class="bottom-nav__item" href="canvas.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <span class="bottom-nav__label">Canvas</span>
        </a>
        <a class="bottom-nav__item" href="account.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2" />
                <path d="M4 20c0-4 3.5-7 8-7s8 3 8 7" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" />
            </svg>
            <span class="bottom-nav__label">Account</span>
        </a>
    </nav>
    <script type="module" src="/src/js/index.js"></script>

</body>

</html>
