<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket of Thoughts — Demo</title>
    <script>
        const t = localStorage.getItem('bot_theme_v1');
        if (t) document.documentElement.setAttribute('data-theme', t);
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #18182d;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .demo-card {
            text-align: center;
            padding: 48px 32px;
            max-width: 420px;
            width: 100%;
        }
        .demo-card__logo {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .demo-card__title {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .demo-card__tagline {
            font-size: 15px;
            color: #a0a0b8;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .demo-card__btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 32px;
            background: #ffca28;
            color: #18182d;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.15s;
            width: 100%;
            max-width: 280px;
        }
        .demo-card__btn:hover {
            background: #ffd54f;
        }
        .demo-card__signin {
            margin-top: 24px;
            font-size: 13px;
            color: #a0a0b8;
        }
        .demo-card__signin a {
            color: #ffca28;
            text-decoration: none;
        }
        .demo-card__signin a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="demo-card">
        <div class="demo-card__logo" aria-hidden="true">&#x1F4A1;</div>
        <h1 class="demo-card__title">Bucket of Thoughts</h1>
        <p class="demo-card__tagline">
            Capture ideas as they come. Organize, review, and connect them on a freeform canvas.
        </p>
        <button class="demo-card__btn" id="startDemoBtn">
            Start Demo
        </button>
        <p class="demo-card__signin">
            Already have an account? <a href="/signin.html">Sign in</a>
        </p>
    </div>

    <script type="module">
        import { startDemo } from './src/lib/demo/demo-mode.js';
        document.getElementById('startDemoBtn').addEventListener('click', () => {
            startDemo();
        });
    </script>
</body>
</html>
