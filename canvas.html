<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Canvas - BOT</title>
    <meta name="theme-color" content="#ffca28">
    <link rel="manifest" href="/manifest.json">
    <script src="/sw-register.js" defer></script>
</head>

<body>
    <a href="#canvasViewport" class="skip-link">Skip to main content</a>
    <main class="app-container">
        <!-- Desktop Sidebar -->
        <aside class="desktop-sidebar" aria-label="Main Navigation">
            <div class="sidebar-header">
                <h2>BOT</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html">Capture</a>
                <a href="review.html">Review</a>
                <a href="categories.html">Categories</a>
                <a href="canvas.html" class="is-active">Canvas</a>
                <a href="account.html">Account</a>
            </nav>
            <div class="sidebar-footer">
                <div id="sidebarSync" class="sync-indicator"></div>
            </div>
        </aside>

        <div class="main-content-wrap canvas-page">
            <!-- Canvas Viewport -->
            <div class="canvas-viewport" id="canvasViewport">
                <div class="canvas-surface" id="canvasSurface">
                    <!-- Category cards and headers placed here dynamically -->
                </div>
            </div>

            <!-- Zoom Controls — top-right overlay -->
            <div class="canvas-zoom-overlay" id="canvasToolbar">
                <button type="button" class="canvas-zoom-overlay__btn" id="zoomOutBtn" aria-label="Zoom out">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
                <span class="canvas-zoom-overlay__level" id="zoomLevel">100%</span>
                <button type="button" class="canvas-zoom-overlay__btn" id="zoomInBtn" aria-label="Zoom in">
                    <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                        <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
            </div>

            <!-- Add Buttons — bottom-right overlay (vertical stack) -->
            <div class="canvas-add-overlay">
                <button type="button" class="canvas-add-overlay__btn" id="addCategoryBtn" aria-haspopup="true" aria-expanded="false" aria-label="Add category list">
                    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                        <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <span class="canvas-add-overlay__label">Add List</span>
                </button>
                <button type="button" class="canvas-add-overlay__btn canvas-add-overlay__btn--secondary" id="addHeaderBtn" aria-label="Add header">
                    <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
                        <path d="M4 6h16M4 12h10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    <span class="canvas-add-overlay__label">Header</span>
                </button>
            </div>

            <!-- Category Dropdown (md3-menu pattern) -->
            <div id="canvasCategoryMenu" class="md3-menu" hidden role="listbox" aria-label="Choose category to add">
                <div id="canvasCategoryMenuContent" class="md3-menu__scroll"></div>
            </div>

            <!-- Header Pills — bottom bar above navigation -->
            <nav class="canvas-header-pills-bar" id="headerPills" aria-label="Canvas sections" role="navigation">
                <!-- Header pills inserted dynamically -->
            </nav>
        </div>
    </main>

    <!-- Thread Slide-out Panel -->
    <div class="canvas-thread-panel" id="canvasThreadPanel" hidden>
        <div class="canvas-thread-panel__header">
            <button type="button" class="canvas-thread-panel__close" id="threadPanelClose" aria-label="Close">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <span class="canvas-thread-panel__title">Notes</span>
        </div>
        <div class="canvas-thread-panel__body" id="canvasThreadBody">
            <!-- Cloned idea-bubble + thread notes rendered here -->
        </div>
    </div>

    <nav class="bottom-nav" aria-label="App navigation">
        <a class="bottom-nav__item" href="index.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            <span class="bottom-nav__label">Capture</span>
        </a>
        <a class="bottom-nav__item" href="review.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 7h12M6 12h12M6 17h8" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="4" cy="7" r="1" fill="currentColor" />
                <circle cx="4" cy="12" r="1" fill="currentColor" />
                <circle cx="4" cy="17" r="1" fill="currentColor" />
            </svg>
            <span class="bottom-nav__label">Review</span>
        </a>
        <a class="bottom-nav__item" href="categories.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4a8 8 0 1 0 0 16h1a1.5 1.5 0 0 0 0-3h-.75a2.75 2.75 0 0 1 0-5.5h.25a2.5 2.5 0 0 0 0-5H12z"
                    fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                    stroke-linejoin="round" />
                <circle cx="15.5" cy="9" r="1.1" fill="currentColor" />
                <circle cx="9" cy="9" r="1.1" fill="currentColor" />
                <circle cx="10.5" cy="14" r="1.1" fill="currentColor" />
            </svg>
            <span class="bottom-nav__label">Categories</span>
        </a>
        <a class="bottom-nav__item is-active" href="canvas.html" aria-current="page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <span class="bottom-nav__label">Canvas</span>
        </a>
        <a class="bottom-nav__item" href="account.html">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2" />
                <path d="M4 20c0-4 3.5-7 8-7s8 3 8 7" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" />
            </svg>
            <span class="bottom-nav__label">Account</span>
        </a>
    </nav>
    <script type="module" src="/src/js/canvas.js"></script>

</body>

</html>
