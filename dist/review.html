            <header class="top-bar">

                    <h1>Your Ideas</h1>
                </div>
            </header>
            <div class="filters">
                <div class="select-wrap filter-select filter-select--status">
                    <label for="status" class="visually-hidden">Filter by status</label>
                    <select id="status" aria-label="Filter by status">
                        <option value="all">All items</option>
                        <option value="active">Active</option>
                        <option value="archived">Archived</option>
                    </select>
                </div>
                <div class="select-wrap filter-select filter-select--category">
                    <button type="button" id="categoryFilterToggle" class="filter-multi-toggle" aria-haspopup="true"
                        aria-expanded="false" aria-label="Filter by categories"><span>All categories</span></button>
                    <div id="categoryFilterPanel" class="filter-multi-panel" hidden>
                        <div id="categoryFilterOptions" class="filter-multi-options"></div>
                        <div class="filter-multi-actions">
                            <button type="button" data-filter-clear aria-label="Clear category filters">Clear</button>
                        </div>
                    </div>
                </div>
                <div class="select-wrap filter-select filter-select--sort">
                    <select id="sortBy" aria-label="Sort by">
                        <option value="date">Most recent</option>
                        <option value="priority">Priority (high → low)</option>
                    </select>
                </div>
            </div>
            <label for="cat" class="visually-hidden">Categories filter (internal)</label>
            <select id="cat" multiple hidden aria-label="Categories filter"></select>
            <ul id="list" class="list"></ul>
            <!-- Anchored Category Edit Dropdown -->
            <div id="categoryEditDropdown" class="md3-menu" hidden>

            </div>
        </div>

        <!-- Desktop Detail Pane -->
        <aside class="detail-pane" id="detailPane">
            <button type="button" class="detail-pane__close" aria-label="Close detail pane">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <line x1="6" y1="6" x2="18" y2="18" stroke-width="2" stroke-linecap="round" />
                    <line x1="18" y1="6" x2="6" y2="18" stroke-width="2" stroke-linecap="round" />
                </svg>
            </button>
            <div class="detail-pane-empty">
                <p>Select an idea to view details and notes.</p>
            </div>
            <div id="detailContent" class="detail-content" hidden>
                <!-- Dynamically populated when an idea is selected -->
            </div>
        </aside>
    </main>

    <!-- Category Add Modal -->

        <div class="category-modal__panel">
            <div class="category-modal__header">

                <button type="button" class="category-modal__close" aria-label="Close">

                        <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2"

                <!-- Category options will be populated here -->

        </div>

    <div class="search-fab" id="searchFab">

        <div class="search-fab__panel" hidden>

            <button type="button" class="search-fab__clear" aria-label="Clear search">
