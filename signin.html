<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sign In - BOT</title>
    <meta name="theme-color" content="#ffca28">
    <link rel="manifest" href="/manifest.json">
    <script src="/sw-register.js" defer></script>
</head>

<body>
    <a href="#googleSignInBtn" class="skip-link">Skip to main content</a>
    <div class="signin-container">
        <div class="signin-card">
            <h1>Sign in to Bucket of Thoughts</h1>
            <p>Use your Google account to access and sync your notes securely.</p>

            <button type="button" class="btn-primary google-btn" id="googleSignInBtn">
                Continue with Google
            </button>

            <div style="display:flex;align-items:center;gap:12px;margin:16px 0;">
                <hr style="flex:1;border:none;border-top:1px solid #333;">
                <span style="color:#a0a0b8;font-size:13px;">or</span>
                <hr style="flex:1;border:none;border-top:1px solid #333;">
            </div>
            <button id="tryDemoBtn" class="signin-demo-btn" style="
                display:inline-flex;align-items:center;justify-content:center;gap:8px;
                padding:12px 24px;background:transparent;color:#ffca28;
                font-size:14px;font-weight:600;border:1px solid #ffca28;
                border-radius:12px;cursor:pointer;width:100%;
                transition:background 0.15s;">
                Try Demo
            </button>

            <div id="statusMessage" class="status-message" hidden></div>

            <div class="help-text">
                <strong>Migrating from the legacy User ID?</strong><br>
                Sign in with Google, then follow the migration steps in the Account page to import your existing notes.
            </div>
        </div>
    </div>
    <script type="module" src="/src/js/signin.js"></script>

</body>

</html>
